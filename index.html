<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Olaf Scharfenberg - WEBGUARDS</title>
    <link rel="stylesheet" href="styles.css" />
    <link href="includes/plugins/google/scheduling-button-script.css" rel="stylesheet">
  </head>
  <body>
    <nav>
      <div class="nav-container">
        <div class="nav-logo">WΞBGUΛRDS</div>
        <div class="nav-links">
          <a href="https://1018.3cx.cloud/callus/#olaf" target="_blank" rel="noopener">
            Kontakt
          </a>
          <button id="nav-termin" class="nav-btn" onclick="openScheduling()">
            Termin
          </button>
        </div>
      </div>
    </nav>

    <header>
      <div class="header-content">
        <div class="header-text">
          <h1>Olaf Scharfenberg</h1>
          <p>IT-Techniker & Gründer</p>
          <button class="cta" onclick="openScheduling()">Rückruf vereinbaren</button>
        </div>
        <div class="header-image">
          <img src="olafscharfenberg.png" alt="Olaf Scharfenberg" />
        </div>
      </div>
    </header>

    <section class="about">
      <h2>Über mich</h2>
      <p>
        Ich baue Automatisierungslösungen für Unternehmen — Android-Apps, n8n-Workflows, 
        Custom Tools. Pragmatisch, effizient, fokussiert auf Entlastung.
      </p>
    </section>

    <footer>
      <p>&copy; 2026 WEBGUARDS-DE. All rights reserved.</p>
      <div class="footer-links">
        <a href="https://github.com/wbgrds" target="_blank" rel="noopener">GitHub</a>
        <a href="https://1018.3cx.cloud/callus/#olaf" target="_blank" rel="noopener">
          Kontakt
        </a>
        <button onclick="openScheduling()" style="background: none; border: none; color: inherit; cursor: pointer; text-decoration: inherit;">
          Kalender
        </button>
      </div>
    </footer>

    <!-- Google Calendar Appointment Scheduling -->
    <script src="includes/plugins/google/scheduling-button-script.js" defer></script>
    <div id="cal"></div>

    <script>
      window.addEventListener('load', function() {
        if (window.calendar && window.calendar.schedulingButton) {
          window.calendar.schedulingButton.load({
            target: document.getElementById('cal'),
            url: 'https://cal.com/wbgrds/hotline',
            label: 'Rückruftermin',
            color: '#039BE5'
          });
        }
      });

      function openScheduling() {
        const button = document.querySelector('.qxCTlb');
        if (button) {
          button.click();
        }
      }
    </script>
  </body>
</html>
